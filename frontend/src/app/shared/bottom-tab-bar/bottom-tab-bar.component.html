<nav class="relative flex items-center bg-surface-raised/80 backdrop-blur-md border-t border-border/40 pb-safe"
  aria-label="Navigazione principale">
  @if (activeIndex() !== null) {
  <div
    class="absolute top-1/2 w-11 h-11 -translate-x-1/2 -translate-y-1/2 rounded-xl bg-primary transition-[left] duration-300 ease-out motion-reduce:transition-none"
    [style.left]="'calc(' + (100 / navItems.length) * (activeIndex()! + 0.5) + '%)'"
    aria-hidden="true"></div>
  }
  @for (item of navItems; track item.route) {
  <a [routerLink]="item.route" routerLinkActive="text-white"
    [routerLinkActiveOptions]="{ exact: item.exact }"
    class="relative z-10 flex-1 flex items-center justify-center min-h-13 py-2 text-text-tertiary transition-colors"
    [attr.aria-label]="item.mobileLabel">
    @switch (item.icon) {
      @case ('dashboard') {
        <svg lucideLayoutDashboard aria-hidden="true" class="w-5 h-5"></svg>
      }
      @case ('weekly') {
        <svg lucideCalendarDays aria-hidden="true" class="w-5 h-5"></svg>
      }
      @case ('recipes') {
        <svg lucideBookOpen aria-hidden="true" class="w-5 h-5"></svg>
      }
      @case ('settings') {
        <svg lucideSettings aria-hidden="true" class="w-5 h-5"></svg>
      }
    }
  </a>
  }
</nav>
