# fly.toml
# Fly.io configuration for api-diet
# Deploy: fly deploy

app = "api-diet"
primary_region = "fra"
kill_signal = "SIGINT"
kill_timeout = 15

[build]
  dockerfile = "docker/Dockerfile"

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL = "info"
  LOG_FORMAT = "json"
  DEBUG = "false"

  # Workers for production
  UVICORN_WORKERS = "2"

  # Database pool
  DATABASE_POOL_SIZE = "15"
  DATABASE_MAX_OVERFLOW = "3"
  DATABASE_POOL_PRE_PING = "true"
  DATABASE_ECHO = "false"

  # Cache settings
  CACHE_TTL_DEFAULT = "300"
  CACHE_TTL_USERS = "600"

  # Rate limiting
  RATE_LIMIT_REQUESTS = "100"
  RATE_LIMIT_WINDOW = "60"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"
    protocol = "http"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 2

[deploy]
  release_command = "python -m alembic upgrade head"
  strategy = "immediate"